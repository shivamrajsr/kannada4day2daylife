<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಕನ್ನಡ ಕಲಿಯಿರಿ — Kannada Learning Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Noto+Sans+Kannada:wght@300;400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── SHARED RESET & BASE ── */
:root {
  --ink: #0e0c0a;
  --paper: #f7f2ea;
  --rust: #b84c2a;
  --gold: #c8922a;
  --gold-bright: #e8a820;
  --sage: #4a6741;
  --slate: #3a4a5c;
  --muted: #7a6e62;
  --rule: #ddd4c0;
  --card-bg: #ffffff;
  --highlight: #fff8ed;
  --cream: #fdf6e3;
  --dark: #1a1208;
  --mid: #4a3728;
  --red: #c0392b;
  --white: #fffdf7;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', 'Noto Sans', sans-serif;
  min-height: 100vh;
}

/* ── GLOBAL HEADER ── */
.app-header {
  background: var(--ink);
  padding: 36px 24px 0;
  position: relative;
  overflow: hidden;
}

.app-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 20px,
    rgba(232,168,32,0.04) 20px,
    rgba(232,168,32,0.04) 40px
  );
  pointer-events: none;
}

.app-header::after {
  content: 'ಕನ್ನಡ';
  position: absolute;
  right: -10px; top: -8px;
  font-family: 'Noto Sans Kannada', sans-serif;
  font-size: 150px; font-weight: 700;
  color: rgba(255,255,255,0.03);
  line-height: 1; pointer-events: none; user-select: none;
}

.header-inner {
  max-width: 920px;
  margin: 0 auto;
  position: relative; z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.brand {}

.brand-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}

.brand-title {
  font-family: 'Yatra One', cursive;
  font-size: clamp(1.8rem, 4vw, 3rem);
  color: #fff;
  line-height: 1.1;
  letter-spacing: 1px;
}

.brand-title span { color: var(--gold-bright); }

.brand-sub {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.4);
  font-weight: 300;
  margin-top: 5px;
  letter-spacing: 1px;
}

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  gap: 2px;
  align-items: flex-end;
  position: relative; z-index: 1;
  padding-bottom: 0;
}

.tab-btn {
  padding: 12px 22px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  color: rgba(255,255,255,0.45);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  position: relative;
  top: 1px;
}

.tab-btn:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
}

.tab-btn.active {
  background: var(--paper);
  border-color: rgba(255,255,255,0.15);
  color: var(--ink);
  font-weight: 500;
}

.tab-btn.active .tab-icon { color: var(--gold); }

.tab-icon { margin-right: 6px; }

/* ── TAB PANELS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── PANEL 1: SENTENCES ── */
.sentences-controls {
  max-width: 920px;
  margin: 24px auto 0;
  padding: 0 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
}

.search-box {
  flex: 1; min-width: 200px; max-width: 380px;
  padding: 10px 16px;
  border: 2px solid var(--gold-bright);
  border-radius: 6px;
  background: var(--white);
  font-size: 0.9rem;
  outline: none;
  font-family: inherit;
  color: var(--dark);
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--red); }
.search-box::placeholder { color: #bbb; }

.filter-btn {
  padding: 10px 14px;
  border: 2px solid var(--mid);
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  color: var(--mid);
  transition: all 0.18s;
  white-space: nowrap;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--dark);
  border-color: var(--dark);
  color: var(--gold-bright);
}

.stats-line {
  text-align: center;
  color: var(--mid);
  font-size: 0.82rem;
  margin: 14px auto 0;
  max-width: 920px;
  padding: 0 20px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
}

.sentences-container {
  max-width: 920px;
  margin: 0 auto;
  padding: 20px 20px 60px;
}

.s-card {
  background: var(--white);
  border: 1px solid #e8d8b8;
  border-left: 4px solid var(--gold-bright);
  border-radius: 8px;
  padding: 16px 18px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 0 14px;
  align-items: start;
  transition: box-shadow 0.18s, border-left-color 0.18s;
  animation: fadeUp 0.3s ease forwards;
  opacity: 0;
}
.s-card:hover {
  box-shadow: 0 4px 18px rgba(0,0,0,0.07);
  border-left-color: var(--red);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.s-num {
  font-size: 0.72rem; font-weight: 600;
  color: var(--gold-bright);
  background: var(--dark);
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
  font-family: 'DM Mono', monospace;
}

.s-kannada {
  font-family: 'Noto Sans Kannada', sans-serif;
  font-size: 1.15rem; font-weight: 600;
  color: var(--dark); line-height: 1.4;
}
.s-translit {
  font-size: 0.8rem; color: #999;
  font-style: italic; margin-top: 2px;
  font-family: 'DM Mono', monospace;
}
.s-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
.s-tag {
  font-size: 0.65rem; padding: 2px 7px; border-radius: 10px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.tag-greet   { background:#fef3c7; color:#92400e; }
.tag-polite  { background:#dbeafe; color:#1e40af; }
.tag-daily   { background:#d1fae5; color:#065f46; }
.tag-question{ background:#ede9fe; color:#5b21b6; }
.tag-shop    { background:#fce7f3; color:#9d174d; }
.tag-travel  { background:#e0f2fe; color:#0c4a6e; }
.tag-food    { background:#fef9c3; color:#713f12; }
.tag-emotion { background:#fce7f3; color:#831843; }
.tag-time    { background:#f0fdf4; color:#14532d; }
.tag-help    { background:#fff7ed; color:#7c2d12; }

.s-meanings  { margin-top: 8px; }
.s-meaning-chip {
  background: var(--highlight);
  border: 1px solid #e8dcc8;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 0.82rem; font-weight: 500;
  color: var(--ink);
  display: inline-block;
}
.s-usage {
  background: #fff8ee;
  border-left: 3px solid var(--gold-bright);
  border-radius: 0 6px 6px 0;
  padding: 5px 10px;
  margin-top: 7px;
  font-size: 0.8rem; color: var(--mid);
}
.usage-lbl {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 1px; color: #bbb; font-weight: 600;
  margin-bottom: 2px; font-family: 'DM Mono', monospace;
}

.no-results {
  text-align: center; padding: 60px 20px;
  color: var(--mid); font-size: 1rem;
}

/* ── PANEL 2: DICTIONARY ── */
.dict-intro {
  max-width: 920px;
  margin: 24px auto 0;
  padding: 0 20px;
}

.dict-stat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.dict-stat-pill {
  background: rgba(14,12,10,0.07);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 5px 14px;
  font-size: 0.72rem; color: var(--muted);
  font-family: 'DM Mono', monospace; letter-spacing: 1px;
}
.dict-stat-pill strong { color: var(--rust); }

.dict-toolbar {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 20px 4px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}

.dict-search-wrap { flex: 1; min-width: 200px; position: relative; }
.dict-search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem; color: var(--muted); pointer-events: none;
}
.dict-search {
  width: 100%; padding: 10px 12px 10px 32px;
  border: 1.5px solid var(--rule); border-radius: 6px;
  background: var(--card-bg);
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
  color: var(--ink); outline: none; transition: border-color 0.2s;
}
.dict-search:focus { border-color: var(--rust); }
.dict-search::placeholder { color: #bbb; }

.cat-btn {
  padding: 9px 13px;
  border: 1.5px solid var(--rule); border-radius: 6px;
  background: var(--card-bg); cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); transition: all 0.18s; white-space: nowrap;
}
.cat-btn:hover { border-color: var(--ink); color: var(--ink); }
.cat-btn.active { background: var(--ink); border-color: var(--ink); color: var(--gold); }

.dict-result-line {
  max-width: 920px; margin: 12px auto 0;
  padding: 0 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem; color: var(--muted); letter-spacing: 1px;
}

.dict-grid {
  max-width: 920px;
  margin: 16px auto 60px;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 12px;
}

.d-card {
  background: var(--card-bg);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 18px 20px;
  position: relative; overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s;
  animation: fadeUp 0.35s ease both;
}
.d-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--d-accent, var(--muted));
  border-radius: 10px 0 0 10px;
}
.d-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 26px rgba(0,0,0,0.08);
}

.d-num {
  position: absolute; top: 14px; right: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; color: var(--rule); letter-spacing: 1px;
}
.d-type-tag {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem; letter-spacing: 2px;
  text-transform: uppercase; padding: 3px 8px;
  border-radius: 3px;
  background: var(--d-tag-bg, #f0ece4);
  color: var(--d-tag-color, var(--muted));
  margin-bottom: 9px;
}
.d-word {
  font-family: 'Noto Sans Kannada', sans-serif;
  font-size: 1.85rem; font-weight: 700;
  color: var(--ink); line-height: 1.2; margin-bottom: 2px;
}
.d-pronunc {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem; color: var(--rust);
  letter-spacing: 1px; margin-bottom: 9px;
}
.d-meaning-chip {
  background: var(--highlight);
  border: 1px solid #e8dcc8;
  border-radius: 4px; padding: 4px 10px;
  font-size: 0.82rem; font-weight: 500;
  color: var(--ink); display: inline-block; margin-bottom: 9px;
}
.d-divider { height: 1px; background: var(--rule); margin: 8px 0; }
.d-usage-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem; text-transform: uppercase;
  letter-spacing: 2px; color: #bbb; font-weight: 600; margin-bottom: 3px;
}
.d-usage-text { font-size: 0.8rem; color: var(--muted); line-height: 1.55; }
.d-ex-kn {
  font-family: 'Noto Sans Kannada', sans-serif;
  font-size: 0.88rem; color: var(--slate);
  font-weight: 600; margin-top: 5px;
}
.d-ex-hi { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 2px; }

/* type accent colors */
.d-pronoun { --d-accent: var(--rust);  --d-tag-bg: #fdeee9; --d-tag-color: var(--rust); }
.d-verb    { --d-accent: var(--sage);  --d-tag-bg: #edf3ec; --d-tag-color: var(--sage); }
.d-question{ --d-accent: #2a7fa8;      --d-tag-bg: #e5f2f8; --d-tag-color: #2a7fa8; }
.d-aux     { --d-accent: #a87a2a;      --d-tag-bg: #f8f2e5; --d-tag-color: #a87a2a; }
.d-adv     { --d-accent: #8b5e9a;      --d-tag-bg: #f3edf8; --d-tag-color: #8b5e9a; }

.d-no-result {
  grid-column: 1/-1; text-align: center;
  padding: 60px; color: var(--muted); font-size: 1rem;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  background: var(--ink);
  color: rgba(255,255,255,0.2);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; letter-spacing: 3px;
  padding: 18px; text-transform: uppercase;
}
</style>
</head>
<body>

<!-- ── GLOBAL HEADER ── -->
<div class="app-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-eyebrow">ಕನ್ನಡ ಕಲಿಯಿರಿ · Learn Kannada</div>
      <h1 class="brand-title">ಕನ್ನಡ <span>ಗೈಡ್</span></h1>
      <p class="brand-sub">हिंदी भाषियों के लिए सम्पूर्ण कन्नड़ मार्गदर्शिका</p>
    </div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('sentences', this)">
        <span class="tab-icon">📜</span>Top 100 Sentences
      </button>
      <button class="tab-btn" onclick="switchTab('dictionary', this)">
        <span class="tab-icon">📖</span>Core 50 Dictionary
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     TAB 1: TOP 100 SENTENCES
══════════════════════════════════════ -->
<div class="tab-panel active" id="panel-sentences">

  <div class="sentences-controls">
    <input class="search-box" type="text" id="s-search" placeholder="Search Kannada, Hindi, English…">
    <button class="filter-btn active" onclick="sFilter('all',this)">सभी</button>
    <button class="filter-btn" onclick="sFilter('greet',this)">अभिवादन</button>
    <button class="filter-btn" onclick="sFilter('daily',this)">रोज़ाना</button>
    <button class="filter-btn" onclick="sFilter('question',this)">सवाल</button>
    <button class="filter-btn" onclick="sFilter('shop',this)">खरीददारी</button>
    <button class="filter-btn" onclick="sFilter('food',this)">खाना</button>
    <button class="filter-btn" onclick="sFilter('travel',this)">सफर</button>
    <button class="filter-btn" onclick="sFilter('emotion',this)">भावनाएं</button>
  </div>
  <div class="stats-line" id="s-stats">100 वाक्य दिखाए जा रहे हैं</div>
  <div class="sentences-container" id="s-container"></div>

</div>

<!-- ══════════════════════════════════════
     TAB 2: CORE 50 DICTIONARY
══════════════════════════════════════ -->
<div class="tab-panel" id="panel-dictionary">

  <div class="dict-intro">
    <div class="dict-stat-row">
      <div class="dict-stat-pill"><strong>13</strong> Pronouns · सर्वनाम</div>
      <div class="dict-stat-pill"><strong>20</strong> Verbs · क्रियाएं</div>
      <div class="dict-stat-pill"><strong>7</strong> Questions · प्रश्न शब्द</div>
      <div class="dict-stat-pill"><strong>10</strong> Aux / Adv · सहायक</div>
    </div>
  </div>

  <div class="dict-toolbar">
    <div class="dict-search-wrap">
      <span class="dict-search-icon">🔍</span>
      <input class="dict-search" id="d-search" type="text" placeholder="Search Kannada, Hindi, English…">
    </div>
    <button class="cat-btn active" onclick="dFilter('all',this)">All</button>
    <button class="cat-btn" onclick="dFilter('pronoun',this)">Pronouns</button>
    <button class="cat-btn" onclick="dFilter('verb',this)">Verbs</button>
    <button class="cat-btn" onclick="dFilter('question',this)">Questions</button>
    <button class="cat-btn" onclick="dFilter('aux',this)">Aux/Adv</button>
  </div>
  <div class="dict-result-line" id="d-result">50 शब्द · All categories</div>
  <div class="dict-grid" id="d-grid"></div>

</div>

<footer>ಕನ್ನಡ ರಾಜ್ಯೋತ್ಸವ · Kannada Learning Guide · कन्नड़ सीखिए</footer>

<script>
/* ══════════════════════
   TAB SWITCHING
══════════════════════ */
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}

/* ══════════════════════
   SENTENCES DATA
══════════════════════ */
const sentences = [
  { k:"ನಮಸ್ಕಾರ", t:"Namaskāra", h:"नमस्कार", u:"किसी से भी मिलते समय अभिवादन के लिए — सुबह, दोपहर, शाम कभी भी।", tags:["greet"] },
  { k:"ಹೇಗಿದ್ದೀರಾ?", t:"Hēgiddīrā?", h:"आप कैसे हैं?", u:"किसी से हाल-चाल पूछने के लिए (formal)।", tags:["greet"] },
  { k:"ಚೆನ್ನಾಗಿದ್ದೇನೆ, ಧನ್ಯವಾದ", t:"Chennāgiddēne, dhanyavāda", h:"मैं ठीक हूँ, धन्यवाद", u:"जब कोई आपका हाल पूछे तो जवाब देने के लिए।", tags:["greet","polite"] },
  { k:"ಧನ್ಯವಾದ", t:"Dhanyavāda", h:"धन्यवाद / शुक्रिया", u:"किसी का आभार व्यक्त करने के लिए।", tags:["polite"] },
  { k:"ದಯವಿಟ್ಟು", t:"Dayaviṭṭu", h:"कृपया / Please", u:"विनम्रता से कुछ माँगते समय।", tags:["polite"] },
  { k:"ಕ್ಷಮಿಸಿ", t:"Kṣamisi", h:"माफ़ करें / सॉरी", u:"गलती होने पर या किसी का ध्यान खींचने के लिए।", tags:["polite"] },
  { k:"ಹೌದು", t:"Haudu", h:"हाँ", u:"किसी बात से सहमति जताने के लिए।", tags:["daily"] },
  { k:"ಇಲ್ಲ", t:"Illa", h:"नहीं", u:"मना करने या असहमति जताने के लिए।", tags:["daily"] },
  { k:"ಸರಿ", t:"Sari", h:"ठीक है / ओके", u:"सहमति या स्वीकृति देने के लिए।", tags:["daily"] },
  { k:"ನಿಮ್ಮ ಹೆಸರೇನು?", t:"Nimma hesarēnu?", h:"आपका नाम क्या है?", u:"नया परिचय करते समय नाम जानने के लिए।", tags:["question","greet"] },

/* ══════════════════════
   SENTENCES LOGIC
══════════════════════ */
let sCurTag = 'all';

const tagLabelMap = { greet:'अभिवादन', polite:'शिष्टाचार', daily:'रोज़ाना', question:'सवाल', shop:'खरीददारी', travel:'सफर', food:'खाना', emotion:'भावनाएं', time:'समय', help:'मदद' };

function renderSentences(list) {
  const c = document.getElementById('s-container');
  c.innerHTML = '';
  document.getElementById('s-stats').textContent = `${list.length} वाक्य दिखाए जा रहे हैं`;
  if (!list.length) { c.innerHTML = '<div class="no-results">कोई वाक्य नहीं मिला 🔍</div>'; return; }
  list.forEach((item, idx) => {
    const origIdx = sentences.indexOf(item) + 1;
    const tagHtml = item.tags.map(t => `<span class="s-tag tag-${t}">${tagLabelMap[t]||t}</span>`).join('');
    const card = document.createElement('div');
    card.className = 's-card';
    card.style.animationDelay = `${Math.min(idx*0.025, 0.5)}s`;
    card.innerHTML = `
      <div class="s-num">${origIdx}</div>
      <div>
        <div class="s-kannada">${item.k}</div>
        <div class="s-translit">${item.t}</div>
        <div class="s-tags">${tagHtml}</div>
        <div class="s-meanings"><span class="s-meaning-chip">${item.h}</span></div>
        <div class="s-usage"><div class="usage-lbl">उपयोग</div>${item.u}</div>
      </div>`;
    c.appendChild(card);
  });
}

function sFilter(tag, btn) {
  sCurTag = tag;
  document.querySelectorAll('#panel-sentences .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sApply();
}

function sApply() {
  const q = document.getElementById('s-search').value.toLowerCase();
  const list = sentences.filter(item => {
    const tm = sCurTag === 'all' || item.tags.includes(sCurTag);
    const sm = !q || item.k.includes(q) || item.h.toLowerCase().includes(q) || item.t.toLowerCase().includes(q) || item.u.toLowerCase().includes(q);
    return tm && sm;
  });
  renderSentences(list);
}

document.getElementById('s-search').addEventListener('input', sApply);

/* ══════════════════════
   DICTIONARY LOGIC
══════════════════════ */
let dCurCat = 'all';

const typeLabel = { pronoun:'Pronoun · सर्वनाम', verb:'Verb · क्रिया', question:'Question · प्रश्न', aux:'Aux · सहायक', adv:'Adverb · क्रियाविशेषण' };

function renderDict(list) {
  const g = document.getElementById('d-grid');
  g.innerHTML = '';
  document.getElementById('d-result').textContent = `${list.length} शब्द · ${dCurCat === 'all' ? 'All categories' : dCurCat}`;
  if (!list.length) { g.innerHTML = '<div class="d-no-result">कोई शब्द नहीं मिला 🔍</div>'; return; }
  list.forEach((w, i) => {
    const idx = words.indexOf(w) + 1;
    const card = document.createElement('div');
    card.className = `d-card d-${w.type}`;
    card.style.animationDelay = `${Math.min(i*0.035, 0.6)}s`;
    card.innerHTML = `
      <span class="d-num">#${String(idx).padStart(2,'0')}</span>
      <div class="d-type-tag">${typeLabel[w.type]||w.type}</div>
      <div class="d-word">${w.k}</div>
      <div class="d-pronunc">[ ${w.p} ]</div>
      <div class="d-meaning-chip">${w.h}</div>
      <div class="d-divider"></div>
      <div class="d-usage-lbl">Usage · उपयोग</div>
      <div class="d-usage-text">${w.u}</div>
      <div class="d-ex-kn">${w.ex_k}</div>
      <div class="d-ex-hi">→ ${w.ex_h}</div>`;
    g.appendChild(card);
  });
}

function dFilter(cat, btn) {
  dCurCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  dApply();
}

function dApply() {
  const q = document.getElementById('d-search').value.toLowerCase().trim();
  const list = words.filter(w => {
    const catOk = dCurCat === 'all' || w.type === dCurCat || (dCurCat === 'aux' && w.type === 'adv');
    const textOk = !q || w.k.includes(q) || w.p.toLowerCase().includes(q) || w.h.includes(q) || w.u.toLowerCase().includes(q) || w.ex_h.toLowerCase().includes(q);
    return catOk && textOk;
  });
  renderDict(list);
}

document.getElementById('d-search').addEventListener('input', dApply);

/* ── INIT ── */
renderSentences(sentences);
renderDict(words);
