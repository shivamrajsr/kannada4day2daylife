<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಕನ್ನಡ ಕಲಿಯಿರಿ — Top 100 Kannada Sentences</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Noto+Sans+Kannada:wght@400;600&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --gold: #e8a820;
    --cream: #fdf6e3;
    --dark: #1a1208;
    --mid: #4a3728;
    --light: #f5e6c8;
    --white: #fffdf7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    color: var(--gold);
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(232,168,32,0.04) 20px,
      rgba(232,168,32,0.04) 40px
    );
  }

  .header-inner { position: relative; z-index: 1; }

  .kannada-title {
    font-family: 'Yatra One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--gold);
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 1rem;
    color: rgba(232,168,32,0.7);
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .controls {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    padding: 10px 16px;
    border: 2px solid var(--gold);
    border-radius: 6px;
    background: var(--white);
    font-size: 0.95rem;
    outline: none;
    font-family: inherit;
    color: var(--dark);
  }

  .search-box:focus { border-color: var(--red); }

  .filter-btn {
    padding: 10px 16px;
    border: 2px solid var(--mid);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    color: var(--mid);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--gold);
  }

  .stats {
    text-align: center;
    color: var(--mid);
    font-size: 0.85rem;
    margin: 16px auto 0;
    max-width: 900px;
    padding: 0 20px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .card {
    background: var(--white);
    border: 1px solid #e8d8b8;
    border-left: 4px solid var(--gold);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 0 16px;
    align-items: start;
    transition: box-shadow 0.2s, border-left-color 0.2s;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-left-color: var(--red);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-num {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--gold);
    background: var(--dark);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-body {}

  .kannada {
    font-family: 'Noto Sans Kannada', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.4;
  }

  .transliteration {
    font-size: 0.85rem;
    color: #888;
    font-style: italic;
    margin-top: 2px;
  }

  .tags-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-greet { background: #fef3c7; color: #92400e; }
  .tag-polite { background: #dbeafe; color: #1e40af; }
  .tag-daily { background: #d1fae5; color: #065f46; }
  .tag-question { background: #ede9fe; color: #5b21b6; }
  .tag-shop { background: #fce7f3; color: #9d174d; }
  .tag-travel { background: #e0f2fe; color: #0c4a6e; }
  .tag-food { background: #fef9c3; color: #713f12; }
  .tag-emotion { background: #fce7f3; color: #831843; }
  .tag-time { background: #f0fdf4; color: #14532d; }
  .tag-help { background: #fff7ed; color: #7c2d12; }

  .meanings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }

  .meaning-box {
    background: var(--cream);
    border-radius: 6px;
    padding: 6px 10px;
  }

  .meaning-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .meaning-text {
    font-size: 0.9rem;
    color: var(--mid);
    font-weight: 500;
  }

  .usage-box {
    background: #fff8ee;
    border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
    padding: 6px 10px;
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--mid);
  }

  .usage-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #bbb;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .hidden { display: none !important; }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--mid);
    font-size: 1.1rem;
  }

  footer {
    text-align: center;
    background: var(--dark);
    color: rgba(232,168,32,0.5);
    font-size: 0.8rem;
    padding: 20px;
    letter-spacing: 1px;
  }
</style>
</head>

let currentTag = 'all';

function renderCards(items) {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  if (items.length === 0) {
    container.innerHTML = '<div class="no-results">कोई वाक्य नहीं मिला 🔍</div>';
    document.getElementById('statsLine').textContent = '0 वाक्य मिले';
    return;
  }
  document.getElementById('statsLine').textContent = `${items.length} वाक्य दिखाए जा रहे हैं`;
  items.forEach((item, idx) => {
    const tagBadges = item.tags.map(t => `<span class="tag tag-${t}">${tagLabel(t)}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(idx * 0.03, 0.5)}s`;
    card.innerHTML = `
      <div class="card-num">${data.indexOf(item) + 1}</div>
      <div class="card-body">
        <div class="kannada">${item.k}</div>
        <div class="transliteration">${item.t}</div>
        <div class="tags-row">${tagBadges}</div>
        <div class="meanings">
          <div class="meaning-box">
            <div class="meaning-label">हिंदी अर्थ</div>
            <div class="meaning-text">${item.h}</div>
          </div>
        </div>
        <div class="usage-box">
          <div class="usage-label">उपयोग</div>
          ${item.u}
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function tagLabel(t) {
  const map = { greet:'अभिवादन', polite:'शिष्टाचार', daily:'रोज़ाना', question:'सवाल', shop:'खरीददारी', travel:'सफर', food:'खाना', emotion:'भावनाएं', time:'समय', help:'मदद' };
  return map[t] || t;
}

function filterTag(tag, btn) {
  currentTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = data.filter(item => {
    const tagMatch = currentTag === 'all' || item.tags.includes(currentTag);
    const textMatch = !q || item.k.includes(q) || item.h.toLowerCase().includes(q) || item.t.toLowerCase().includes(q) || item.u.toLowerCase().includes(q);
    return tagMatch && textMatch;
  });
  renderCards(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
renderCards(data);
